<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BookChat — புத்தகம் கேளுங்க</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #f59e0b;
  --accent2: #fbbf24;
  --teal: #fb923c;
  --rose: #fb7185;
  --amber: #fbbf24;
  --text: #e8e8f0;
  --muted: #6b6b80;
  --muted2: #9898b0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG mesh */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,106,247,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(45,212,191,0.05) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* ===== PAGE SYSTEM ===== */
.page { display:none; min-height:100vh; position:relative; z-index:1; }
.page.active { display:flex; flex-direction:column; animation: pageIn 0.4s ease; }
@keyframes pageIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ===== TOPBAR ===== */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding: 1.2rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(12px);
  position:sticky; top:0; z-index:100;
}

.logo {
  display:flex; align-items:center; gap:0.6rem;
}

.logo-hex {
  width:32px; height:32px;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex; align-items:center; justify-content:center;
  font-size:0.75rem; font-weight:700; color:#fff;
  background: linear-gradient(135deg, #f59e0b, #ef4444) !important;
}

.logo-name {
  font-family:'Syne', sans-serif;
  font-weight:800; font-size:1.1rem;
  background: linear-gradient(90deg, #fbbf24, #f87171);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

.topbar-right { display:flex; align-items:center; gap:0.8rem; }

.settings-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius:8px;
  padding:0.4rem 0.8rem;
  color: var(--muted2);
  font-family:'DM Mono',monospace;
  font-size:0.65rem;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.05em;
}
.settings-btn:hover { border-color:var(--accent); color:var(--accent2); }

.step-indicator {
  display:flex; gap:0.4rem; align-items:center;
}
.step-dot {
  width:6px; height:6px; border-radius:50%;
  background: var(--surface2); border:1px solid var(--border2);
  transition:all 0.3s;
}
.step-dot.done { background:var(--teal); border-color:var(--teal); }
.step-dot.active { background:var(--accent); border-color:var(--accent); width:18px; border-radius:3px; }

/* ===== CONTENT ===== */
.content { flex:1; padding:1.5rem; max-width:680px; margin:0 auto; width:100%; }

.page-title {
  font-family:'Instrument Serif', serif;
  font-size:1.7rem;
  line-height:1.2;
  margin-bottom:0.4rem;
  color:#fff;
}
.page-title span { color:var(--accent2); font-style:italic; }

.page-sub {
  font-size:0.62rem;
  color:var(--muted);
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-bottom:2rem;
}

/* ===== INPUT CARDS ===== */
.input-cards { display:flex; flex-direction:column; gap:0.8rem; margin-bottom:1.5rem; }

.input-card {
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  transition:all 0.25s;
}

.input-card-header {
  display:flex; align-items:center; gap:0.8rem;
  padding:0.9rem 1.2rem;
  cursor:pointer;
  user-select:none;
}

.input-card-header:hover { background:rgba(255,255,255,0.02); }

.card-icon {
  width:36px; height:36px;
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; flex-shrink:0;
}

.icon-text { background:rgba(124,106,247,0.15); }
.icon-doc  { background:rgba(45,212,191,0.12); }
.icon-link { background:rgba(251,191,36,0.12); }

.card-info { flex:1; }
.card-title {
  font-family:'Syne',sans-serif;
  font-size:0.8rem; font-weight:700;
  color:var(--text);
  margin-bottom:0.1rem;
}
.card-desc { font-size:0.58rem; color:var(--muted); }

.card-toggle {
  font-size:0.7rem; color:var(--muted);
  transition:transform 0.2s;
}
.input-card.open .card-toggle { transform:rotate(180deg); }

.card-body {
  display:none;
  padding:0 1.2rem 1.2rem;
  border-top:1px solid var(--border);
}
.input-card.open .card-body { display:block; }

textarea, input[type="text"], input[type="password"], input[type="url"] {
  width:100%;
  background: rgba(255,255,255,0.03);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:0.8rem;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:0.65rem;
  line-height:1.8;
  resize:vertical;
  outline:none;
  transition:border-color 0.2s;
  margin-top:0.8rem;
}
textarea:focus, input:focus { border-color:var(--accent); }
textarea::placeholder, input::placeholder { color:var(--muted); }

/* File drop */
.file-drop {
  margin-top:0.8rem;
  border:1px dashed var(--border2);
  border-radius:8px;
  padding:1.5rem;
  text-align:center;
  cursor:pointer;
  transition:all 0.2s;
}
.file-drop:hover, .file-drop.dragover {
  border-color:var(--accent);
  background:rgba(124,106,247,0.05);
}
.file-drop-icon { font-size:1.5rem; margin-bottom:0.4rem; }
.file-drop-text { font-size:0.6rem; color:var(--muted); line-height:1.8; }
.file-drop-text strong { color:var(--accent2); display:block; margin-bottom:0.2rem; }

.file-items { display:flex; flex-direction:column; gap:0.4rem; margin-top:0.6rem; }
.file-item {
  display:flex; align-items:center; gap:0.6rem;
  background:rgba(45,212,191,0.06);
  border:1px solid rgba(45,212,191,0.15);
  border-radius:6px; padding:0.5rem 0.8rem;
  font-size:0.6rem;
}
.file-item-name { flex:1; color:var(--teal); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-item-rm { color:var(--rose); cursor:pointer; padding:0.1rem 0.3rem; }

/* ===== NEXT BTN ===== */
.next-btn {
  width:100%;
  background: linear-gradient(135deg, var(--accent), #5b4fd4);
  border:none;
  border-radius:12px;
  padding:1rem;
  color:#fff;
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:0.85rem;
  letter-spacing:0.05em;
  cursor:pointer;
  transition:all 0.25s;
  display:flex; align-items:center; justify-content:center; gap:0.6rem;
  margin-top:1rem;
}
.next-btn:hover { transform:translateY(-2px); box-shadow:0 12px 32px rgba(124,106,247,0.3); }
.next-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

.back-btn {
  background:transparent;
  border:1px solid var(--border2);
  border-radius:8px;
  padding:0.6rem 1.2rem;
  color:var(--muted2);
  font-family:'DM Mono',monospace;
  font-size:0.65rem;
  cursor:pointer;
  transition:all 0.2s;
}
.back-btn:hover { border-color:var(--accent); color:var(--accent2); }

/* ===== PAGE 2: REVIEW ===== */
.source-preview {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:1.2rem;
}

.source-preview-header {
  padding:0.7rem 1.2rem;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0.6rem;
  background:var(--surface2);
}

.source-preview-label {
  font-size:0.58rem; text-transform:uppercase;
  letter-spacing:0.15em; color:var(--muted);
  flex:1;
}

.source-chars {
  font-size:0.58rem; color:var(--accent2);
  background:rgba(124,106,247,0.1);
  padding:0.15rem 0.5rem; border-radius:20px;
}

.source-text {
  padding:1rem 1.2rem;
  font-size:0.62rem;
  line-height:1.9;
  color:var(--muted2);
  max-height:150px;
  overflow-y:auto;
  white-space:pre-wrap;
  word-break:break-word;
}

/* Chat box */
.chat-container {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:300px;
  margin-bottom:1.2rem;
}

.chat-messages {
  flex:1;
  padding:1rem;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:0.8rem;
  min-height:200px;
  max-height:300px;
}

.chat-msg {
  display:flex; gap:0.6rem; align-items:flex-start;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn {
  from { opacity:0; transform:translateY(6px); }
  to { opacity:1; transform:translateY(0); }
}

.msg-avatar {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem; flex-shrink:0;
  font-weight:600;
}
.msg-avatar.user { background:rgba(124,106,247,0.2); color:var(--accent2); border:1px solid rgba(124,106,247,0.3); }
.msg-avatar.ai   { background:rgba(45,212,191,0.15); color:var(--teal); border:1px solid rgba(45,212,191,0.25); }

.msg-bubble {
  flex:1; padding:0.7rem 0.9rem;
  border-radius:0 10px 10px 10px;
  font-size:0.68rem; line-height:1.7;
}
.msg-bubble.user { background:rgba(124,106,247,0.08); border:1px solid rgba(124,106,247,0.15); }
.msg-bubble.ai   { background:rgba(45,212,191,0.06); border:1px solid rgba(45,212,191,0.12); font-family:'Instrument Serif',serif; font-size:0.85rem; }

.chat-input-row {
  display:flex; gap:0.6rem;
  padding:0.8rem;
  border-top:1px solid var(--border);
  background:var(--surface2);
}

.chat-input {
  flex:1;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:0.6rem 0.9rem;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:0.65rem;
  outline:none;
  resize:none;
  margin:0;
}

.send-btn {
  background: var(--accent);
  border:none; border-radius:8px;
  padding:0.6rem 1rem;
  color:#fff;
  font-size:0.8rem;
  cursor:pointer;
  transition:all 0.2s;
  flex-shrink:0;
}
.send-btn:hover { background:var(--accent2); }
.send-btn:disabled { opacity:0.4; cursor:not-allowed; }

.typing-indicator {
  display:flex; gap:4px; padding:0.5rem 0.9rem; align-items:center;
}
.typing-dot {
  width:5px; height:5px; border-radius:50%;
  background:var(--teal); opacity:0.4;
  animation: typingBounce 1s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay:0.15s; }
.typing-dot:nth-child(3) { animation-delay:0.3s; }
@keyframes typingBounce {
  0%,100% { opacity:0.3; transform:translateY(0); }
  50%      { opacity:1;   transform:translateY(-4px); }
}

/* ===== PAGE 3: AUDIO ===== */
.lang-row {
  display:flex; gap:0.6rem; margin-bottom:1.2rem;
}

.lang-btn {
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:0.7rem;
  color:var(--muted2);
  font-family:'DM Mono',monospace;
  font-size:0.65rem;
  cursor:pointer;
  transition:all 0.2s;
  text-align:center;
}
.lang-btn.active {
  border-color:var(--teal);
  background:rgba(45,212,191,0.08);
  color:var(--teal);
}

.length-row {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:0.6rem; margin-bottom:1.5rem;
}

.length-btn {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:0.8rem 0.5rem;
  color:var(--muted2);
  font-family:'DM Mono',monospace;
  font-size:0.6rem;
  cursor:pointer;
  transition:all 0.2s;
  text-align:center;
}
.length-btn .len-icon { font-size:1.1rem; display:block; margin-bottom:0.3rem; }
.length-btn .len-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.65rem; display:block; }
.length-btn .len-desc { font-size:0.52rem; color:var(--muted); margin-top:0.1rem; display:block; }
.length-btn.active { border-color:var(--amber); background:rgba(251,191,36,0.08); color:var(--amber); }
.length-btn.active .len-desc { color:rgba(251,191,36,0.6); }

.section-label {
  font-size:0.58rem; text-transform:uppercase;
  letter-spacing:0.15em; color:var(--muted);
  margin-bottom:0.8rem;
  display:flex; align-items:center; gap:0.5rem;
}
.section-label::after {
  content:''; flex:1; height:1px;
  background:var(--border);
}

.voice-modes { display:flex; flex-direction:column; gap:0.7rem; margin-bottom:1.5rem; }

.voice-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1rem 1.2rem;
  cursor:pointer;
  transition:all 0.25s;
  display:flex; align-items:center; gap:1rem;
}
.voice-card:hover { border-color:var(--border2); background:rgba(255,255,255,0.02); }
.voice-card.active { border-color:var(--accent); background:rgba(124,106,247,0.06); }

.voice-icon { font-size:1.5rem; flex-shrink:0; }

.voice-info { flex:1; }
.voice-name {
  font-family:'Syne',sans-serif;
  font-weight:700; font-size:0.8rem;
  color:var(--text); margin-bottom:0.2rem;
}
.voice-desc { font-size:0.6rem; color:var(--muted); line-height:1.6; }

.voice-check {
  width:20px; height:20px; border-radius:50%;
  border:2px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size:0.6rem; transition:all 0.2s;
  flex-shrink:0;
}
.voice-card.active .voice-check {
  background:var(--accent); border-color:var(--accent); color:#fff;
}

/* Audio player */
.audio-output {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  display:none;
}

.audio-output.visible { display:block; animation: pageIn 0.4s ease; }

.audio-header {
  padding:1.2rem 1.5rem;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
  display:flex; align-items:center; gap:0.8rem;
}

.audio-playing-indicator {
  display:flex; gap:3px; align-items:flex-end; height:20px;
}
.audio-bar {
  width:3px; background:var(--accent2); border-radius:2px;
  animation: audioBar 0.8s ease-in-out infinite;
}
.audio-bar:nth-child(2) { animation-delay:0.1s; height:10px; }
.audio-bar:nth-child(3) { animation-delay:0.2s; height:16px; }
.audio-bar:nth-child(4) { animation-delay:0.3s; height:8px; }
.audio-bar:nth-child(5) { animation-delay:0.4s; height:14px; }
@keyframes audioBar {
  0%,100% { transform:scaleY(0.4); }
  50%      { transform:scaleY(1); }
}

.audio-title-section { flex:1; }
.audio-mode-label { font-size:0.55rem; text-transform:uppercase; letter-spacing:0.15em; color:var(--muted); }
.audio-track-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.85rem; color:var(--text); margin-top:0.1rem; }

.script-container {
  padding:1.2rem 1.5rem;
  max-height:280px;
  overflow-y:auto;
}

/* Solo script */
.solo-script {
  font-family:'Instrument Serif',serif;
  font-size:1rem;
  line-height:1.9;
  color:var(--muted2);
}
.solo-script p { margin-bottom:1em; }

/* Duo script */
.duo-script { display:flex; flex-direction:column; gap:0.8rem; }
.duo-line { display:flex; gap:0.7rem; align-items:flex-start; }
.duo-line.female { flex-direction:row-reverse; }
.duo-avatar {
  width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem; flex-shrink:0; font-weight:600;
}
.duo-line.male   .duo-avatar { background:rgba(124,106,247,0.2); color:var(--accent2); border:1px solid rgba(124,106,247,0.3); }
.duo-line.female .duo-avatar { background:rgba(251,113,133,0.15); color:var(--rose); border:1px solid rgba(251,113,133,0.3); }
.duo-bubble {
  flex:1; max-width:85%;
  padding:0.7rem 0.9rem;
  font-family:'Instrument Serif',serif;
  font-size:0.9rem;
  line-height:1.65;
}
.duo-line.male   .duo-bubble { background:rgba(124,106,247,0.06); border:1px solid rgba(124,106,247,0.15); border-radius:0 10px 10px 10px; }
.duo-line.female .duo-bubble { background:rgba(251,113,133,0.06); border:1px solid rgba(251,113,133,0.15); border-radius:10px 0 10px 10px; }
.duo-speaker { font-family:'DM Mono',monospace; font-size:0.52rem; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:0.25rem; }
.duo-line.male   .duo-speaker { color:var(--accent2); }
.duo-line.female .duo-speaker { color:var(--rose); }

/* Drama script */
.drama-script { display:flex; flex-direction:column; gap:0.9rem; }
.drama-line { padding-left:0.5rem; }
.drama-character {
  font-family:'DM Mono',monospace;
  font-size:0.58rem; font-weight:500;
  text-transform:uppercase; letter-spacing:0.15em;
  margin-bottom:0.2rem;
}
.drama-dialogue {
  font-family:'Instrument Serif',serif;
  font-size:0.95rem; line-height:1.65;
  padding-left:1rem;
}
.drama-stage {
  font-family:'Instrument Serif',serif;
  font-style:italic; font-size:0.8rem;
  color:var(--muted); text-align:center;
  padding:0.3rem 0;
}
.drama-scene {
  background:rgba(255,255,255,0.03);
  border-left:2px solid var(--border2);
  padding:0.4rem 0.8rem;
  font-family:'DM Mono',monospace;
  font-size:0.58rem; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--muted);
  margin:0.5rem 0;
}

/* char colors */
.char-color-0 .drama-character { color:#a78bfa; }
.char-color-1 .drama-character { color:#2dd4bf; }
.char-color-2 .drama-character { color:#fb7185; }
.char-color-3 .drama-character { color:#fbbf24; }
.char-color-4 .drama-character { color:#6ee7b7; }

.audio-controls {
  padding:1rem 1.5rem;
  border-top:1px solid var(--border);
  display:flex; gap:0.7rem; align-items:center;
  background:var(--surface2);
}

.ctrl-btn {
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:0.5rem 0.9rem;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:0.6rem;
  cursor:pointer;
  transition:all 0.2s;
  display:flex; align-items:center; gap:0.4rem;
}
.ctrl-btn:hover { border-color:var(--accent); color:var(--accent2); }
.ctrl-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.ctrl-btn.primary:hover { background:var(--accent2); border-color:var(--accent2); }

.ctrl-btn.stop { background:rgba(251,113,133,0.1); border-color:rgba(251,113,133,0.3); color:var(--rose); }

.dl-btn {
  margin-left:auto;
  background:rgba(45,212,191,0.08);
  border:1px solid rgba(45,212,191,0.2);
  border-radius:8px;
  padding:0.5rem 0.9rem;
  color:var(--teal);
  font-family:'DM Mono',monospace;
  font-size:0.6rem;
  cursor:pointer;
  transition:all 0.2s;
}
.dl-btn:hover { background:rgba(45,212,191,0.15); }

/* Loading */
.gen-loading {
  display:none;
  padding:2rem; text-align:center;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; margin-bottom:1rem;
}
